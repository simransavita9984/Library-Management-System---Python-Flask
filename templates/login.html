<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login – Library Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-wrapper">
    <div class="login-card">
        <div class="logo">📚</div>
        <h1>Library Management</h1>
        <p class="subtitle">Sign in to continue</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }}">{{ msg }}</div>
            {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>User ID</label>
                <input type="text" name="username" placeholder="Enter your User ID" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;margin-top:6px;">Login</button>
        </form>
        <p style="text-align:center;margin-top:18px;color:#888;font-size:0.82rem;">
            Admin: <strong>adm / adm</strong> &nbsp;|&nbsp; User: <strong>user / user</strong>
        </p>
    </div>
</div>
</body>
</html>
