{% extends 'base.html' %}
{% block title %}Issue Book{% endblock %}
{% block content %}
<div class="layout-sidebar">
    <div class="sidebar">
        <h3>Transactions</h3>
        <a href="{{ url_for('book_available') }}" class="sidebar-link">🔍 Book Available?</a>
        <a href="{{ url_for('book_issue') }}" class="sidebar-link active">📤 Issue Book</a>
        <a href="{{ url_for('return_book') }}" class="sidebar-link">📥 Return Book</a>
        <a href="{{ url_for('pay_fine') }}" class="sidebar-link">💰 Pay Fine</a>
    </div>
    <div class="card">
        <h2>📤 Book Issue</h2>
        <form method="POST" id="issueForm">
            <div class="form-group">
                <label>Book Name <span style="color:red">*</span></label>
                <select name="serial_no" id="serialSelect" required onchange="fillAuthor(this)">
                    <option value="">-- Select Book --</option>
                    {% for book in books %}
                    <option value="{{ book.serial_no }}" {% if request.args.get('serial') == book.serial_no %}selected{% endif %}>
                        {{ book.name }} ({{ book.serial_no }})
                    </option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Author Name</label>
                <input type="text" id="authorField" name="author" placeholder="Auto-populated" readonly style="background:#f5f5f5;">
            </div>
            <div class="form-group">
                <label>Membership ID <span style="color:red">*</span></label>
                <input type="text" name="membership_id" placeholder="Enter membership ID" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Issue Date <span style="color:red">*</span></label>
                    <input type="date" name="issue_date" id="issueDate" required min="{{ today }}" onchange="setReturnDate()">
                </div>
                <div class="form-group">
                    <label>Return Date (max 15 days)</label>
                    <input type="date" name="return_date" id="returnDate" required>
                </div>
            </div>
            <div class="form-group">
                <label>Remarks <span style="color:#888;font-weight:normal;">(Optional)</span></label>
                <textarea name="remarks" placeholder="Any remarks..."></textarea>
            </div>
            <div class="btn-group">
                <button type="submit" class="btn btn-success">✔ Issue Book</button>
                <a href="{{ url_for('cancel') }}" class="btn btn-danger">✘ Cancel</a>
                <a href="{{ url_for('home') }}" class="btn btn-secondary">← Home</a>
            </div>
        </form>
    </div>
</div>

<script>
const today = new Date().toISOString().split('T')[0];
document.getElementById('issueDate').min = today;

function setReturnDate() {
    const issueDate = document.getElementById('issueDate').value;
    if (issueDate) {
        const d = new Date(issueDate);
        d.setDate(d.getDate() + 15);
        const ret = d.toISOString().split('T')[0];
        document.getElementById('returnDate').value = ret;
        document.getElementById('returnDate').max = ret;
    }
}

function fillAuthor(sel) {
    const serial = sel.value;
    if (!serial) return;
    fetch('/get_book_info?serial_no=' + serial)
        .then(r => r.json())
        .then(data => { document.getElementById('authorField').value = data.author || ''; });
}

// Auto-fill if pre-selected
window.onload = function() {
    const sel = document.getElementById('serialSelect');
    if (sel.value) fillAuthor(sel);
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('issueDate').value = today;
    setReturnDate();
};
</script>
{% endblock %}
